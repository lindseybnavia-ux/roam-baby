<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="ROAM baby — design objects for early childhood movement. Coming soon." />
<title>ROAM baby — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAF5F0;
    --rust: #B85C38;
    --orange: #FA7F28;
    --yellow: #FBE15A;
    --sand: #CFA775;
    --dark: #2D2D2D;
    --muted: #6b7280;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .page {
    display: flex;
    width: 100%;
    max-width: 1100px;
    min-height: 580px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.07);
    background: var(--bg);
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 4rem 3.5rem 4rem 4rem;
    background: var(--bg);
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: clamp(52px, 7vw, 80px);
    color: var(--rust);
    line-height: 1;
    letter-spacing: -1.5px;
    margin-bottom: 1rem;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(16px, 2vw, 22px);
    color: var(--rust);
    line-height: 1.4;
    max-width: 340px;
    margin-bottom: 1rem;
  }

  .sub {
    font-size: 15px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 2rem;
  }

  .form-wrap { max-width: 420px; }
  .form { display: flex; gap: 10px; }

  .form input {
    flex: 1;
    padding: 14px 20px;
    border-radius: 999px;
    border: 1.5px solid rgba(207,167,117,0.4);
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--dark);
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
    min-width: 0;
  }

  .form input:focus {
    border-color: var(--rust);
    box-shadow: 0 0 0 3px rgba(184,92,56,0.12);
  }

  .form button {
    padding: 14px 22px;
    border-radius: 999px;
    background: var(--rust);
    color: white;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .form button:hover {
    background: var(--orange);
    transform: translateY(-2px);
  }

  .thankyou {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: white;
    border-radius: 999px;
    border: 1.5px solid rgba(184,92,56,0.25);
    animation: fadeIn 0.5s ease;
  }

  .thankyou.visible { display: flex; }

  .thankyou-icon {
    width: 28px;
    height: 28px;
    background: var(--rust);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .thankyou-icon svg { width: 14px; height: 14px; }

  .thankyou p {
    font-size: 14px;
    color: var(--rust);
    font-weight: 500;
    line-height: 1.3;
  }

  .thankyou p span {
    display: block;
    font-weight: 300;
    color: var(--muted);
    font-size: 13px;
    margin-top: 2px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── RIGHT PANEL ── */
  .right {
    width: 42%;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Blobs — full opacity, no blend mode, vivid colors */
  .blob-orange {
    position: absolute;
    bottom: -8%;
    right: 8%;
    width: 230px;
    height: 340px;
    background: #FF7A1A;
    border-radius: 230px 230px 0 0;
    opacity: 1;
  }

  .blob-yellow {
    position: absolute;
    top: 16%;
    right: 6%;
    width: 160px;
    height: 160px;
    background: #F9D923;
    border-radius: 50%;
    opacity: 1;
    animation: floatY 6s ease-in-out infinite;
  }

  .blob-sand {
    position: absolute;
    bottom: 20%;
    left: 6%;
    width: 115px;
    height: 115px;
    background: #E8944A;
    border-radius: 50%;
    opacity: 1;
    animation: floatY 7s ease-in-out 3s infinite;
  }

  .photos {
    position: relative;
    width: 300px;
    height: 400px;
    z-index: 3;
  }

  .photo {
    position: absolute;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 36px rgba(0,0,0,0.15);
    transition: transform 0.4s;
  }

  .photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
    display: block;
  }

  .photo-top {
    top: 16px;
    left: 0;
    width: 155px;
    height: 205px;
    padding: 6px;
    transform: rotate(-4deg);
  }

  .photo-top:hover { transform: rotate(0); }

  .photo-bottom {
    bottom: 16px;
    right: 0;
    width: 200px;
    height: 128px;
    padding: 6px;
    transform: rotate(3deg);
  }

  .photo-bottom:hover { transform: rotate(0); }

  .tag {
    position: absolute;
    top: 40%;
    right: 24px;
    background: rgba(255,255,255,0.94);
    padding: 10px 18px;
    border-radius: 8px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.10);
    transform: rotate(12deg);
    z-index: 5;
    border: 1px solid rgba(207,167,117,0.2);
  }

  .tag span {
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--dark);
  }

  .social {
    position: absolute;
    bottom: 18px;
    right: 18px;
    display: flex;
    gap: 18px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    padding: 9px 20px;
    border-radius: 999px;
    z-index: 6;
    border: 1px solid rgba(207,167,117,0.2);
  }

  .social a {
    font-size: 13px;
    color: var(--rust);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .social a:hover { color: var(--orange); }

  @keyframes floatY {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-16px); }
  }

  /* ── MOBILE ── */
  @media (max-width: 720px) {
    body { padding: 0; align-items: stretch; }

    .page {
      flex-direction: column;
      border-radius: 0;
      min-height: 100vh;
      box-shadow: none;
    }

    .right {
      width: 100%;
      height: 340px;
      order: -1;
      flex-shrink: 0;
    }

    .photos { width: 260px; height: 300px; }
    .photo-top { width: 120px; height: 160px; }
    .photo-bottom { width: 160px; height: 100px; }
    .blob-orange { width: 160px; height: 240px; }
    .blob-yellow { width: 110px; height: 110px; }
    .blob-sand { width: 80px; height: 80px; }
    .tag { right: 16px; padding: 8px 14px; }
    .social { bottom: 12px; right: 12px; padding: 7px 16px; }

    .left { padding: 2.5rem 1.75rem 3rem; justify-content: flex-start; }
    .brand { font-size: 58px; margin-bottom: 0.75rem; }
    .tagline { font-size: 18px; max-width: 100%; }

    .form { flex-direction: column; gap: 10px; }
    .form input, .form button { width: 100%; text-align: center; }
    .form button { padding: 16px; }
  }

  @media (max-width: 400px) {
    .brand { font-size: 46px; }
    .right { height: 280px; }
    .photos { width: 220px; height: 260px; }
    .photo-top { width: 100px; height: 135px; }
    .photo-bottom { width: 138px; height: 88px; }
  }
</style>
</head>

        <p>You're on the list!
          <span>We'll be in touch when ROAM baby launches.</span>
        </p>

<script>
  function getEmails() {
    try { return JSON.parse(localStorage.getItem('roam_emails') || '[]'); }
    catch(e) { return []; }
  }

  function saveEmail(email) {
    const emails = getEmails();
    if (!emails.includes(email)) {
      emails.push(email);
      localStorage.setItem('roam_emails', JSON.stringify(emails));
    }
  }

  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  function submitEmail() {
    const input = document.getElementById('emailInput');
    const email = input.value.trim();

    if (!isValidEmail(email)) {
      input.style.borderColor = '#e53e3e';
      input.style.boxShadow = '0 0 0 3px rgba(229,62,62,0.15)';
      input.focus();
      setTimeout(() => {
        input.style.borderColor = '';
        input.style.boxShadow = '';
      }, 2000);
      return;
    }

    saveEmail(email);
    document.getElementById('emailForm').style.display = 'none';
    document.getElementById('thankyou').classList.add('visible');
  }

  document.getElementById('emailInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitEmail();
  });
</script>
